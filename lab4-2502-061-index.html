<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图书商城</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f1f1f1;
        }
        header {
            width: 100%;
            height: 60px;
            background-color: #2c3e50;
            display: flex;
            align-items: center;
            padding: 0 20px;
            color: white;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
        }
        .top-btn {
            margin-left: 20px;
            display: flex;
            gap: 10px;
        }
        .top-btn button {
            padding: 6px 16px;
            border: none;
            border-radius: 4px;
            background-color: #3498db;
            color: white;
            cursor: pointer;

            transition: all 0.3s ease;
        }
        .top-btn button:hover {
            background: linear-gradient(45deg, #3498db, #2ecc71);
            transform: scale(1.1);
        }
        .top-nav {
            margin-left: auto;
        }
        .top-nav ul {
            display: flex;
            list-style: none;
            gap: 40px;
            align-items: center;
        }
        .top-nav a {
            color: white;
            text-decoration: none;
            font-size: 16px;
        }
        
        .search-btn-only {
            padding: 6px 14px;
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;

            transition: transform 0.5s ease;
        }
        .search-btn-only:hover {
            background: #2980b9;
            transform: rotate(360deg);
        }
        .cart-icon {
            width: 30px;
            height: 30px;
            display: inline-block;
 
            transition: transform 0.5s ease;
        }
        .cart-icon:hover {
            transform: rotate(360deg);
        }
        .container {
            width: 1400px;
            margin: 20px auto;
            display: flex;
            gap: 20px;
            position: relative;
        }
        .left-aside {
            width: 220px;
            background-color: #fff;
            padding: 20px;
            border-radius: 4px;
        }
        .left-aside h3 {
            font-size: 18px;
            color: #333;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
            margin-bottom: 20px;
        }
        .cate-list li {
            list-style: none;
            margin: 20px 0;
            font-size: 16px;
            color: #333;
        }
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .banner {
            width: 100%;
            height: 300px;
            overflow: hidden;
            position: relative;
        }
        .banner ul {
            list-style: none;
            position: absolute;
            width: 100%;
            height: 100%;
            animation: slideUp 10s infinite linear;
        }
        .banner li {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }
        .banner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes slideUp {
            0%, 25% {
                transform: translateY(0);
            }
            33%, 58% {
                transform: translateY(-100%);
            }
            66%, 91% {
                transform: translateY(-200%);
            }
            100% {
                transform: translateY(0);
            }
        }
        .hot-book {
            background-color: #fff;
            padding: 20px;
            border-radius: 4px;
        }
        .hot-book h3 {
            font-size: 18px;
            color: #ff6600;
            margin-bottom: 20px;
        }
        .hot-list {
            display: flex;
            gap: 20px;
        }

        .hot-list img {
            width: 220px;
            height: auto;
            transition: all 0.3s ease;
        }
        .hot-list img:hover {
            transform: translateX(10px) scale(1.05);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        .new-book {
            background-color: #fff;
            padding: 20px;
            border-radius: 4px;
        }
        .new-book h3 {
            font-size: 18px;
            color: #27ae60;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }
        table th, table td {
            border: 1px solid #ccc;
            padding: 12px;
        }
        table th {
            background-color: #ecf0f1;
        }
        .right-aside {
            width: 220px;
            background-color: #fff;
            padding: 20px;
            border-radius: 4px;
        }
        .right-aside h3 {
            font-size: 18px;
            color: #ff7700;
            margin-bottom: 15px;
        }
        .promo-text {
            color: red;
            font-size: 15px;
            line-height: 1.8;
        }
        .modal {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 260px;
            background: #ffffff;
            padding: 25px;
            border-radius: 6px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            z-index: 99;
            display: none;
        }
        .modal h4 {
            text-align: center;
            margin-bottom: 18px;
            font-size: 18px;
        }
        .modal input {
            width: 100%;
            height: 38px;
            margin: 8px 0;
            padding: 0 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .modal .btn {
            width: 100%;
            height: 38px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
        }
        .switch-tip {
            text-align: center;
            margin-top: 12px;
            font-size: 13px;
            color: #666;
        }
        .switch-tip span {
            color: #3498db;
            cursor: pointer;
        }
        img {
            max-width: 100% !important;
            height: auto !important;
            object-fit: contain;
            display: block;
            margin: 0 auto;
        }
    </style>
</head>

<script>
    function openLogin() {
        document.getElementById('loginModal').style.display = 'block';
        document.getElementById('regModal').style.display = 'none';
    }
    function openReg() {
        document.getElementById('regModal').style.display = 'block';
        document.getElementById('loginModal').style.display = 'none';
    }
    function switchToReg() {
        document.getElementById('loginModal').style.display = 'none';
        document.getElementById('regModal').style.display = 'block';
    }
    function switchToLogin() {
        document.getElementById('regModal').style.display = 'none';
        document.getElementById('loginModal').style.display = 'block';
    }
    function loginCheck() {
        const user = document.getElementById('loginUser').value;
        const pwd = document.getElementById('loginPwd').value;
        if (!user || !pwd) {
            alert('请输入用户名和密码！');
            return;
        }
        alert('登录成功！');
        document.getElementById('loginModal').style.display = 'none';
    }
    function registerUser() {
        const user = document.getElementById('regUser').value;
        const pwd = document.getElementById('regPwd').value;
        const pwd2 = document.getElementById('regPwd2').value;
        if (!user || !pwd || !pwd2) {
            alert('请填写完整信息！');
            return;
        }
        if (pwd !== pwd2) {
            alert('两次密码不一致！');
            return;
        }
        alert('注册成功！');
        document.getElementById('regModal').style.display = 'none';
    }
    function doSearch() {
        alert('搜索功能');
    }
</script>
